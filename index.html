<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista della Spesa Smart</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #ef4444;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h2 { text-align: center; color: var(--primary); margin-top: 0; }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
        }

        button#add-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        ul { list-style: none; padding: 0; margin-bottom: 20px; }

        li {
            background: #fff;
            border-bottom: 1px solid #f1f5f9;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-text { cursor: pointer; flex-grow: 1; }
        
        .completed {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .delete-btn {
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .clear-btn {
            width: 100%;
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background-color: var(--danger);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🛒 La mia Spesa</h2>
    
    <div class="input-group">
        <input type="text" id="item-input" placeholder="Aggiungi prodotto..." onkeypress="handleKeyPress(event)">
        <button id="add-btn" onclick="addItem()">+</button>
    </div>

    <ul id="shopping-list"></ul>

    <button class="clear-btn" onclick="clearAll()">🗑️ Svuota tutta la lista</button>
</div>

<script>
    const input = document.getElementById('item-input');
    const listContainer = document.getElementById('shopping-list');

    window.onload = () => {
        const savedItems = JSON.parse(localStorage.getItem('myShoppingList')) || [];
        savedItems.forEach(item => renderItem(item.text, item.completed));
    };

    function addItem() {
        const text = input.value.trim();
        if (text === '') return;
        renderItem(text, false);
        saveData();
        input.value = '';
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') addItem();
    }

    function renderItem(text, completed) {
        const li = document.createElement('li');
        li.innerHTML = `
            <span class="item-text ${completed ? 'completed' : ''}" onclick="toggleComplete(this)">
                ${text}
            </span>
            <button class="delete-btn" onclick="removeItem(this)">×</button>
        `;
        listContainer.appendChild(li);
    }

    function toggleComplete(element) {
        element.classList.toggle('completed');
        saveData();
    }

    function removeItem(element) {
        element.parentElement.remove();
        saveData();
    }

    function clearAll() {
        if (confirm("Sei sicuro di voler cancellare tutta la lista?")) {
            listContainer.innerHTML = '';
            localStorage.removeItem('myShoppingList');
        }
    }

    function saveData() {
        const items = [];
        document.querySelectorAll('li').forEach(li => {
            const span = li.querySelector('.item-text');
            items.push({
                text: span.innerText.replace('×', '').trim(),
                completed: span.classList.contains('completed')
            });
        });
        localStorage.setItem('myShoppingList', JSON.stringify(items));
    }
</script>

</body>
</html>
